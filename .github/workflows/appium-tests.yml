name: Appium Kotlin Tests

on:
  workflow_dispatch:
    inputs:

      testClass:
        description: "Select Test Class"
        required: true
        default: "IOSAppAutomation"
        type: choice
        options:
          - AndroidAppAutomation
          - AndroidWebAutomation
          - IOSAppAutomation
          - IOSWebAutomation

      platform:
        description: "Select Platform"
        required: true
        default: "ios"
        type: choice
        options:
          - android
          - ios
          - both

jobs:

  android-test:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest

    env:
      LT_USERNAME: ${{ secrets.LT_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install Dependencies
        run: mvn clean install -DskipTests

      - name: Run Android Test
        run: mvn -Dtest=${{ github.event.inputs.testClass }} test

  ios-test:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest

    env:
      LT_USERNAME: ${{ secrets.LT_USERNAME }}
      LT_ACCESS_KEY: ${{ secrets.LT_ACCESS_KEY }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Install Dependencies
        run: mvn clean install -DskipTests

      - name: Run iOS Test
        run: mvn -Dtest=${{ github.event.inputs.testClass }} test